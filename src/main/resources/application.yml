server:
  port: 3000
  http2:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
  compression:
    enabled: true

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: tasktracker


  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
  config:
    import: optional:file:.env[.properties]
  main:
    allow-bean-definition-overriding: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  cache:
    cache-names: taskAfterCreate,taskById,taskAfterUpdate,taskList,taskListWithPagination
  threads:
    virtual:
      enabled: true
  batch:
    job:
      enabled: true


app:
  cache:
    cacheType: redis
    caches:
      taskAfterCreate:
        ttl: 5m
      taskAfterUpdate:
        ttl: 10m
      taskList:
        ttl: 10m
      taskById:
        ttl: 10m
logging:
  level:
    org.springframework.web: ERROR
    org.springframework.scheduling: INFO
    org.hibernate.SQL: INFO
  file:
    name: logs/application.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
