server:
  port: 3000
spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
  config:
    import: optional:file:.env[.properties]

app:
  redis:
    host: localhost
    port: 6379
  cache:
    cacheType: redis
    caches:
      orderAfterCreate:
        ttl: 5m
      orderById:
        ttl: 10m
      orders:
        ttl: 10m
      comments:
        ttl: 14d
      ordersWithPagination:
        ttl: 20m

